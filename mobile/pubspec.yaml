name: worktaskme
description: WorkTaskMe — Agile tasks + team calendar
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  dio: ^5.4.3+1
  shared_preferences: ^2.2.3
  go_router: ^14.2.0
  table_calendar: ^3.1.2
  intl: ^0.19.0
  uuid: ^4.4.0
  collection: ^1.18.0
  flutter_colorpicker: ^1.1.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

# Launcher icon — place assets/images/app_icon.png (1024×1024), then:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  adaptive_icon_background: "#4F46E5"
  adaptive_icon_foreground: assets/images/app_icon.png
  remove_alpha_ios: true

# Native splash — optional image; color matches BrandColors.backgroundDark
#   dart run flutter_native_splash:create
flutter_native_splash:
  color: "#0F172A"
  color_dark: "#0F172A"
  image: assets/images/splash_logo.png
  android_12:
    color: "#0F172A"
    color_dark: "#0F172A"
    icon_background_color: "#4F46E5"
  web: false
