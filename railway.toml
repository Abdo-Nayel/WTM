# Railway / Nixpacks-friendly deploy config
# Dashboard: https://railway.app → New Project → Deploy from GitHub → Abdo-Nayel/WTM

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
